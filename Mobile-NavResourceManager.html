<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2563eb">
    <title>Mobile Nav Resource Manager</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --primary-light: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --touch-target: 48px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.5;
            padding-bottom: 100px;
        }

        /* Header */
        .header {
            background: var(--primary);
            color: white;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .header-stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 13px;
            opacity: 0.9;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Data Status Banner */
        .data-status {
            padding: 12px 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .data-status.master {
            background: #dcfce7;
            color: #166534;
        }

        .data-status.local {
            background: #fef9c3;
            color: #854d0e;
        }

        .data-status.default {
            background: #fee2e2;
            color: #991b1b;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Search Bar */
        .search-container {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            transition: border-color 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch;
        }

        .filter-chip {
            padding: 8px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Resource List */
        .resource-list {
            padding: 8px 0;
        }

        .resource-card {
            background: var(--surface);
            margin: 0 16px 8px;
            padding: 16px;
            border-radius: var(--radius);
            box-shadow: 0 1px 3px var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .resource-card:active {
            transform: scale(0.98);
        }

        .resource-card.added {
            border-left: 4px solid var(--success);
        }

        .resource-card.edited {
            border-left: 4px solid var(--warning);
        }

        .resource-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }

        .resource-name {
            font-weight: 600;
            font-size: 17px;
            color: var(--text);
            flex: 1;
        }

        .resource-actions {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: var(--border);
        }

        .icon-btn.starred {
            color: var(--warning);
        }

        .icon-btn.delete {
            color: var(--danger);
        }

        .resource-category {
            display: inline-block;
            padding: 4px 10px;
            background: var(--primary);
            color: white;
            font-size: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .resource-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .resource-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .resource-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .change-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .change-badge.added {
            background: #dcfce7;
            color: #166534;
        }

        .change-badge.edited {
            background: #fef3c7;
            color: #92400e;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            min-width: 64px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item-icon {
            font-size: 24px;
        }

        .nav-item-badge {
            position: absolute;
            top: 4px;
            right: 8px;
            background: var(--danger);
            color: white;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .nav-item {
            position: relative;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
            -webkit-backdrop-filter: blur(4px);
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: 20px 20px 0 0;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .modal-body {
            padding: 16px;
        }

        /* Form */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            transition: transform 0.3s, opacity 0.3s;
            z-index: 300;
            text-align: center;
        }

        .toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Changes Panel */
        .changes-panel {
            padding: 16px;
        }

        .changes-summary {
            background: var(--bg);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
        }

        .changes-summary h3 {
            margin: 0 0 12px 0;
            font-size: 16px;
        }

        .changes-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .change-stat {
            text-align: center;
            padding: 12px;
            background: var(--surface);
            border-radius: 8px;
        }

        .change-stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .change-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .change-stat.added .change-stat-value {
            color: var(--success);
        }

        .change-stat.edited .change-stat-value {
            color: var(--warning);
        }

        .change-stat.deleted .change-stat-value {
            color: var(--danger);
        }

        .export-btn,
        .import-btn,
        .clear-btn {
            margin-bottom: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 100px;
            right: 16px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            box-shadow: 0 4px 12px var(--shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: transform 0.2s;
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* About Panel */
        .about-panel {
            padding: 16px;
        }

        .about-section {
            background: var(--surface);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
        }

        .about-section h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }

        .about-section p {
            margin: 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (min-width: 768px) {
            .modal {
                border-radius: 20px;
                margin: auto;
            }

            .resource-list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
                gap: 12px;
                padding: 16px;
            }

            .resource-card {
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>📱 Mobile Nav Manager</h1>
        <div class="header-stats">
            <div class="stat">
                <span>📚</span>
                <span id="totalCount">0 resources</span>
            </div>
            <div class="stat">
                <span>⭐</span>
                <span id="starredCount">0 starred</span>
            </div>
        </div>
    </header>

    <!-- Data Status -->
    <div class="data-status" id="dataStatus">
        <span class="status-indicator"></span>
        <span id="statusText">Loading...</span>
    </div>

    <!-- Search -->
    <div class="search-container">
        <input type="search" class="search-input" id="searchInput" placeholder="🔍 Search resources...">
    </div>

    <!-- Filters -->
    <div class="filters" id="categoryFilters">
        <button class="filter-chip active" data-category="">All</button>
    </div>

    <!-- Resource List -->
    <div class="resource-list" id="resourceList"></div>

    <!-- FAB -->
    <button class="fab" id="addFab">+</button>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-view="resources">
            <span class="nav-item-icon">📚</span>
            <span>Resources</span>
        </button>
        <button class="nav-item" data-view="changes">
            <span class="nav-item-icon">📝</span>
            <span>Changes</span>
            <span class="nav-item-badge" id="changesBadge" style="display: none;">0</span>
        </button>
        <button class="nav-item" data-view="about">
            <span class="nav-item-icon">ℹ️</span>
            <span>About</span>
        </button>
    </nav>

    <!-- Edit/Add Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Add Resource</h2>
                <button class="modal-close" id="closeEditModal">×</button>
            </div>
            <div class="modal-body">
                <form id="resourceForm">
                    <input type="hidden" id="editId">

                    <div class="form-group">
                        <label class="form-label">Name *</label>
                        <input type="text" class="form-input" id="editName" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select class="form-select" id="editCategory" required></select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">URL *</label>
                        <input type="url" class="form-input" id="editUrl" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea" id="editDescription"></textarea>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-group">
                            <input type="checkbox" id="editOffline">
                            <label for="editOffline">Available Offline</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">💾 Save Resource</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Delete Resource?</h2>
                <button class="modal-close" id="closeDeleteModal">×</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px;">Are you sure you want to delete "<strong id="deleteResourceName"></strong>"? This action cannot be undone.</p>
                <button class="btn btn-danger" id="confirmDeleteBtn">🗑️ Delete</button>
                <button class="btn btn-secondary" id="cancelDeleteBtn" style="margin-top: 8px;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================================
        // STATE & DATA MANAGEMENT
        // ============================================================================

        const STORAGE_KEY = 'mobile_nav_data';
        const CHANGES_KEY = 'mobile_nav_changes';
        const MASTER_FILE = 'master-resources.json';

        let state = {
            resources: [],
            changes: {
                added: [],      // Full resource objects
                edited: [],     // {id, originalId, ...resource}
                deleted: []     // Array of IDs
            },
            filter: {
                search: '',
                category: ''
            },
            view: 'resources'
        };

        // Categories for form dropdown
        let CATEGORIES = [];

        // ============================================================================
        // DATA LOADING
        // ============================================================================

        async function loadFromMaster() {
            try {
                const response = await fetch(MASTER_FILE);
                if (!response.ok) throw new Error('Master file not found');
                const data = await response.json();
                return data.resources || [];
            } catch (error) {
                console.warn('Could not load master file:', error.message);
                return null;
            }
        }

        function loadFromStorage() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                return stored ? JSON.parse(stored) : null;
            } catch {
                return null;
            }
        }

        function loadChanges() {
            try {
                const stored = localStorage.getItem(CHANGES_KEY);
                return stored ? JSON.parse(stored) : { added: [], edited: [], deleted: [] };
            } catch {
                return { added: [], edited: [], deleted: [] };
            }
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.resources));
        }

        function saveChanges() {
            localStorage.setItem(CHANGES_KEY, JSON.stringify(state.changes));
            updateChangesBadge();
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        async function initialize() {
            // Load changes first
            state.changes = loadChanges();

            // Try to load from master
            let masterResources = await loadFromMaster();

            if (masterResources) {
                // Apply changes to master data
                state.resources = applyChangesToMaster(masterResources, state.changes);
                updateDataSource('master');
            } else {
                // Fall back to localStorage or empty
                const stored = loadFromStorage();
                state.resources = stored || [];
                updateDataSource(stored ? 'local' : 'default');
            }

            // Extract categories
            CATEGORIES = [...new Set(state.resources.map(r => r.category))].sort();

            // Render
            renderCategoryFilters();
            renderResources();
            updateStats();
            updateChangesBadge();
            populateCategorySelect();
        }

        function applyChangesToMaster(masterResources, changes) {
            let resources = [...masterResources];

            // Remove deleted items
            resources = resources.filter(r => !changes.deleted.includes(r.id));

            // Apply edits
            changes.edited.forEach(edit => {
                const index = resources.findIndex(r => r.id === edit.originalId);
                if (index !== -1) {
                    resources[index] = { ...resources[index], ...edit };
                }
            });

            // Add new items
            resources = [...resources, ...changes.added];

            return resources;
        }

        function updateDataSource(source) {
            const statusDiv = document.getElementById('dataStatus');
            const statusText = document.getElementById('statusText');

            statusDiv.className = 'data-status';

            if (source === 'master') {
                statusDiv.classList.add('master');
                statusText.textContent = '✓ Master data loaded';
            } else if (source === 'local') {
                statusDiv.classList.add('local');
                statusText.textContent = '⚠ Using local data (master unavailable)';
            } else {
                statusDiv.classList.add('default');
                statusText.textContent = '⚠ No data available';
            }
        }

        // ============================================================================
        // CHANGE TRACKING
        // ============================================================================

        function trackAdd(resource) {
            state.changes.added.push(resource);
            saveChanges();
            showToast('✅ Added to changes');
        }

        function trackEdit(originalResource, updatedResource) {
            // Check if already in edited
            const existingIndex = state.changes.edited.findIndex(e => e.originalId === originalResource.id);

            if (existingIndex !== -1) {
                // Update existing edit
                state.changes.edited[existingIndex] = { ...updatedResource, originalId: originalResource.id };
            } else {
                // Add new edit
                state.changes.edited.push({ ...updatedResource, originalId: originalResource.id });
            }

            saveChanges();
            showToast('✏️ Edit tracked');
        }

        function trackDelete(resource) {
            // Check if it was added
            const addedIndex = state.changes.added.findIndex(a => a.id === resource.id);
            if (addedIndex !== -1) {
                // Just remove from added
                state.changes.added.splice(addedIndex, 1);
            } else {
                // Check if it was edited
                const editedIndex = state.changes.edited.findIndex(e => e.originalId === resource.id);
                if (editedIndex !== -1) {
                    state.changes.edited.splice(editedIndex, 1);
                }
                // Add to deleted
                state.changes.deleted.push(resource.id);
            }

            saveChanges();
            showToast('🗑️ Deletion tracked');
        }

        function getChangeStatus(resourceId) {
            if (state.changes.added.some(a => a.id === resourceId)) return 'added';
            if (state.changes.edited.some(e => e.originalId === resourceId)) return 'edited';
            return null;
        }

        // ============================================================================
        // EXPORT/IMPORT
        // ============================================================================

        function exportChanges() {
            if (state.changes.added.length === 0 &&
                state.changes.edited.length === 0 &&
                state.changes.deleted.length === 0) {
                showToast('⚠️ No changes to export');
                return;
            }

            const exportData = {
                version: '1.0.0',
                exportDate: new Date().toISOString(),
                appName: 'Mobile Nav Resource Manager',
                changes: state.changes
            };

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `nav-resources-changes-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showToast('📥 Changes exported!');
        }

        function importChanges(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);

                    // Validate structure
                    if (!data.changes || typeof data.changes !== 'object') {
                        throw new Error('Invalid format');
                    }

                    // Merge changes
                    if (data.changes.added) {
                        data.changes.added.forEach(resource => {
                            if (!state.changes.added.some(a => a.id === resource.id)) {
                                state.changes.added.push(resource);
                            }
                        });
                    }

                    if (data.changes.edited) {
                        data.changes.edited.forEach(edit => {
                            const existingIndex = state.changes.edited.findIndex(e => e.originalId === edit.originalId);
                            if (existingIndex === -1) {
                                state.changes.edited.push(edit);
                            }
                        });
                    }

                    if (data.changes.deleted) {
                        data.changes.deleted.forEach(id => {
                            if (!state.changes.deleted.includes(id)) {
                                state.changes.deleted.push(id);
                            }
                        });
                    }

                    saveChanges();

                    // Reload resources
                    loadFromMaster().then(masterResources => {
                        if (masterResources) {
                            state.resources = applyChangesToMaster(masterResources, state.changes);
                            saveToStorage();
                            CATEGORIES = [...new Set(state.resources.map(r => r.category))].sort();
                            renderCategoryFilters();
                            renderResources();
                            updateStats();
                            populateCategorySelect();
                        }
                    });

                    showToast('✅ Changes imported successfully!');
                } catch (error) {
                    showToast('❌ Failed to import changes');
                    console.error('Import error:', error);
                }
            };
            reader.readAsText(file);
        }

        function clearAllChanges() {
            if (!confirm('Are you sure you want to clear all tracked changes? This cannot be undone.')) {
                return;
            }

            state.changes = { added: [], edited: [], deleted: [] };
            saveChanges();

            // Reload from master
            loadFromMaster().then(masterResources => {
                if (masterResources) {
                    state.resources = masterResources;
                    saveToStorage();
                    CATEGORIES = [...new Set(state.resources.map(r => r.category))].sort();
                    renderCategoryFilters();
                    renderResources();
                    updateStats();
                    populateCategorySelect();
                    updateDataSource('master');
                }
            });

            showToast('🧹 All changes cleared');
        }

        // ============================================================================
        // UI RENDERING
        // ============================================================================

        function renderResources() {
            const container = document.getElementById('resourceList');
            const { search, category } = state.filter;

            // Filter resources
            let filtered = state.resources.filter(r => {
                const matchesSearch = !search ||
                    r.name.toLowerCase().includes(search.toLowerCase()) ||
                    r.description?.toLowerCase().includes(search.toLowerCase());
                const matchesCategory = !category || r.category === category;
                return matchesSearch && matchesCategory;
            });

            // Sort: starred first, then by name
            filtered.sort((a, b) => {
                if (a.starred && !b.starred) return -1;
                if (!a.starred && b.starred) return 1;
                return a.name.localeCompare(b.name);
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>No resources found</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(resource => {
                const changeStatus = getChangeStatus(resource.id);
                const statusBadge = changeStatus ?
                    `<span class="change-badge ${changeStatus}">${changeStatus}</span>` : '';

                return `
                    <div class="resource-card ${changeStatus || ''}" data-id="${resource.id}">
                        <div class="resource-card-header">
                            <div class="resource-name">${escapeHtml(resource.name)}</div>
                            <div class="resource-actions">
                                <button class="icon-btn ${resource.starred ? 'starred' : ''}"
                                        onclick="toggleStar('${resource.id}')"
                                        aria-label="Toggle star">
                                    ${resource.starred ? '⭐' : '☆'}
                                </button>
                                <button class="icon-btn"
                                        onclick="openEditModal('${resource.id}')"
                                        aria-label="Edit">
                                    ✏️
                                </button>
                                <button class="icon-btn delete"
                                        onclick="openDeleteModal('${resource.id}')"
                                        aria-label="Delete">
                                    🗑️
                                </button>
                            </div>
                        </div>
                        <span class="resource-category">${escapeHtml(resource.category)}</span>
                        ${statusBadge}
                        <p class="resource-description">${escapeHtml(resource.description || 'No description')}</p>
                        <div class="resource-meta">
                            ${resource.offlineCapable ? '<span>📴 Offline</span>' : ''}
                            <span>🔗 <a href="${escapeHtml(resource.url)}" target="_blank" style="color: inherit;">Open</a></span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCategoryFilters() {
            const container = document.getElementById('categoryFilters');
            const { category } = state.filter;

            container.innerHTML = `
                <button class="filter-chip ${!category ? 'active' : ''}" data-category="">All</button>
                ${CATEGORIES.map(cat => `
                    <button class="filter-chip ${category === cat ? 'active' : ''}" data-category="${escapeHtml(cat)}">
                        ${escapeHtml(cat)}
                    </button>
                `).join('')}
            `;

            // Add click handlers
            container.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    state.filter.category = chip.dataset.category;
                    renderCategoryFilters();
                    renderResources();
                });
            });
        }

        function renderChangesPanel() {
            const container = document.getElementById('resourceList');
            const { added, edited, deleted } = state.changes;

            container.innerHTML = `
                <div class="changes-panel">
                    <div class="changes-summary">
                        <h3>📝 Your Changes</h3>
                        <div class="changes-stats">
                            <div class="change-stat added">
                                <div class="change-stat-value">${added.length}</div>
                                <div class="change-stat-label">Added</div>
                            </div>
                            <div class="change-stat edited">
                                <div class="change-stat-value">${edited.length}</div>
                                <div class="change-stat-label">Edited</div>
                            </div>
                            <div class="change-stat deleted">
                                <div class="change-stat-value">${deleted.length}</div>
                                <div class="change-stat-label">Deleted</div>
                            </div>
                        </div>

                        <button class="btn btn-success export-btn" onclick="exportChanges()">
                            📥 Export Changes
                        </button>

                        <label class="btn btn-primary import-btn">
                            📤 Import Changes
                            <input type="file" accept=".json" onchange="importChanges(this.files[0])" style="display: none;">
                        </label>

                        <button class="btn btn-danger clear-btn" onclick="clearAllChanges()">
                            🧹 Clear All Changes
                        </button>
                    </div>

                    <div class="about-section">
                        <h3>About Changes</h3>
                        <p style="margin-top: 8px;">
                            Changes are tracked locally and can be exported to a JSON file.
                            Exported changes can be merged into the master database so all apps
                            start with the same updated data.
                        </p>
                    </div>
                </div>
            `;
        }

        function renderAboutPanel() {
            const container = document.getElementById('resourceList');

            container.innerHTML = `
                <div class="about-panel">
                    <div class="about-section">
                        <h3>📱 Mobile Nav Manager</h3>
                        <p style="margin-top: 8px;">
                            A mobile-optimized resource manager for RV navigation resources.
                            Track your edits and export them to share with other apps.
                        </p>
                    </div>

                    <div class="about-section">
                        <h3>💾 Data Storage</h3>
                        <p style="margin-top: 8px;">
                            • Loads from master-resources.json<br>
                            • Edits saved to browser localStorage<br>
                            • Changes tracked for export/import
                        </p>
                    </div>

                    <div class="about-section">
                        <h3>🔄 Export & Import</h3>
                        <p style="margin-top: 8px;">
                            Export your changes to a JSON file. The file contains only added,
                            edited, and deleted resources - perfect for merging into the master
                            database to update all apps.
                        </p>
                    </div>

                    <div class="about-section">
                        <h3>📊 Current Stats</h3>
                        <p style="margin-top: 8px;">
                            • ${state.resources.length} total resources<br>
                            • ${CATEGORIES.length} categories<br>
                            • ${state.resources.filter(r => r.offlineCapable).length} offline-capable<br>
                            • ${state.resources.filter(r => r.starred).length} starred
                        </p>
                    </div>
                </div>
            `;
        }

        function populateCategorySelect() {
            const select = document.getElementById('editCategory');
            select.innerHTML = CATEGORIES.map(cat =>
                `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`
            ).join('');
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = `${state.resources.length} resources`;
            document.getElementById('starredCount').textContent = `${state.resources.filter(r => r.starred).length} starred`;
        }

        function updateChangesBadge() {
            const total = state.changes.added.length + state.changes.edited.length + state.changes.deleted.length;
            const badge = document.getElementById('changesBadge');

            if (total > 0) {
                badge.textContent = total;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        // ============================================================================
        // RESOURCE OPERATIONS
        // ============================================================================

        function toggleStar(id) {
            const resource = state.resources.find(r => r.id === id);
            if (resource) {
                resource.starred = !resource.starred;
                saveToStorage();
                renderResources();
                updateStats();
            }
        }

        function openEditModal(id) {
            const resource = state.resources.find(r => r.id === id);
            if (!resource) return;

            document.getElementById('modalTitle').textContent = 'Edit Resource';
            document.getElementById('editId').value = resource.id;
            document.getElementById('editName').value = resource.name;
            document.getElementById('editCategory').value = resource.category;
            document.getElementById('editUrl').value = resource.url;
            document.getElementById('editDescription').value = resource.description || '';
            document.getElementById('editOffline').checked = resource.offlineCapable || false;

            document.getElementById('editModal').classList.add('active');
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add Resource';
            document.getElementById('resourceForm').reset();
            document.getElementById('editId').value = '';

            // Set default category
            if (CATEGORIES.length > 0) {
                document.getElementById('editCategory').value = CATEGORIES[0];
            }

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveResource(e) {
            e.preventDefault();

            const id = document.getElementById('editId').value;
            const data = {
                id: id || `mob_${Date.now()}`,
                name: document.getElementById('editName').value.trim(),
                category: document.getElementById('editCategory').value,
                url: document.getElementById('editUrl').value.trim(),
                description: document.getElementById('editDescription').value.trim(),
                offlineCapable: document.getElementById('editOffline').checked,
                starred: false
            };

            if (id) {
                // Edit existing
                const originalResource = state.resources.find(r => r.id === id);
                const index = state.resources.findIndex(r => r.id === id);

                if (index !== -1) {
                    state.resources[index] = { ...state.resources[index], ...data };
                    trackEdit(originalResource, state.resources[index]);
                }
            } else {
                // Add new
                state.resources.push(data);
                trackAdd(data);
            }

            saveToStorage();
            renderResources();
            updateStats();
            closeEditModal();
        }

        function openDeleteModal(id) {
            const resource = state.resources.find(r => r.id === id);
            if (!resource) return;

            document.getElementById('deleteResourceName').textContent = resource.name;
            document.getElementById('deleteModal').dataset.id = id;
            document.getElementById('deleteModal').classList.add('active');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
        }

        function confirmDelete() {
            const id = document.getElementById('deleteModal').dataset.id;
            const resource = state.resources.find(r => r.id === id);

            if (resource) {
                state.resources = state.resources.filter(r => r.id !== id);
                trackDelete(resource);
                saveToStorage();
                renderResources();
                updateStats();
            }

            closeDeleteModal();
        }

        // ============================================================================
        // NAVIGATION
        // ============================================================================

        function switchView(view) {
            state.view = view;

            // Update nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.view === view);
            });

            // Show/hide FAB
            document.getElementById('addFab').style.display = view === 'resources' ? 'flex' : 'none';

            // Render appropriate view
            if (view === 'resources') {
                renderResources();
            } else if (view === 'changes') {
                renderChangesPanel();
            } else if (view === 'about') {
                renderAboutPanel();
            }
        }

        // ============================================================================
        // UTILITIES
        // ============================================================================

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');

            setTimeout(() => {
                toast.classList.remove('visible');
            }, 2500);
        }

        // ============================================================================
        // EVENT LISTENERS
        // ============================================================================

        document.getElementById('searchInput').addEventListener('input', (e) => {
            state.filter.search = e.target.value;
            if (state.view === 'resources') {
                renderResources();
            }
        });

        document.getElementById('addFab').addEventListener('click', openAddModal);
        document.getElementById('closeEditModal').addEventListener('click', closeEditModal);
        document.getElementById('closeDeleteModal').addEventListener('click', closeDeleteModal);
        document.getElementById('confirmDeleteBtn').addEventListener('click', confirmDelete);
        document.getElementById('cancelDeleteBtn').addEventListener('click', closeDeleteModal);
        document.getElementById('resourceForm').addEventListener('submit', saveResource);

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchView(item.dataset.view));
        });

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });

        // ============================================================================
        // INITIALIZE
        // ============================================================================

        initialize();
    </script>
</body>
</html>
