<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--border:#2a2d3a;
  --accent:#3b82f6;--accent-hover:#60a5fa;
  --text:#e2e8f0;--text-muted:#94a3b8;--text-dim:#64748b;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --cat-rv:#3b82f6;--cat-topo:#8b5cf6;--cat-blm:#22c55e;
  --cat-camp:#f59e0b;--cat-moto:#ef4444;--cat-safety:#ec4899;--cat-weather:#06b6d4;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;line-height:1.6}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#3a3d4a}
.header-gradient{background:linear-gradient(180deg,#1e293b 0%,#0f1117 100%)}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px}
.stat-pill .stat-num{font-weight:700;font-variant-numeric:tabular-nums}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:40;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.toolbar input,.toolbar select{background:#252836;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent)}
.toolbar input{min-width:200px;flex:1 1 200px}
.toolbar select{min-width:140px}
.toolbar label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);cursor:pointer;white-space:nowrap}
.toolbar label input[type=checkbox]{accent-color:var(--accent);width:16px;height:16px}
.filter-count{font-size:13px;color:var(--text-muted);white-space:nowrap;font-variant-numeric:tabular-nums}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:#252836;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#2f3244}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px}
.grid-container{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;max-width:1600px;margin:0 auto;width:100%}
@media(max-width:1200px){.grid-container{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.grid-container{grid-template-columns:1fr;padding:12px}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative}
.card:hover{transform:scale(1.008);box-shadow:0 4px 24px rgba(0,0,0,.3)}
.card-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:14px 0 0 14px}
.card-body{padding:16px 16px 16px 20px}
.cat-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.3px}
.offline-badge,.cost-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600}
.platform-chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:#252836;color:var(--text-muted)}
.tag-chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:rgba(59,130,246,.1);color:#60a5fa;cursor:pointer;transition:background .2s;border:none;font-family:inherit}
.tag-chip:hover{background:rgba(59,130,246,.2)}
.desc-clamp{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;line-clamp:3}
.desc-full{display:block!important;-webkit-line-clamp:unset!important;overflow:visible!important}
.detail-panel{display:none;border-top:1px solid var(--border);padding:16px 16px 16px 20px;background:#151722;animation:slideDown .25s ease}
.detail-panel.open{display:block}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}
.detail-panel h4{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.detail-panel h4:first-child{margin-top:0}
.feature-item{display:flex;align-items:flex-start;gap:6px;font-size:13px;color:var(--text);margin:4px 0}
.feature-item::before{content:'✓';color:var(--green);font-weight:700;flex-shrink:0}
.card-actions{display:flex;gap:6px;padding:0 16px 12px 20px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h2{font-size:20px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#252836;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.form-check{display:flex;align-items:center;gap:8px;font-size:14px}
.form-check input{accent-color:var(--accent);width:18px;height:18px}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;color:#fff;animation:toastIn .3s ease;min-width:240px;max-width:380px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-success{background:#166534}
.toast-error{background:#991b1b}
.toast-info{background:#1e3a5f}
@keyframes toastIn{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}
.confirm-bar{display:flex;align-items:center;gap:8px;padding:8px 16px 12px 20px;background:rgba(239,68,68,.08);border-top:1px solid rgba(239,68,68,.2);font-size:13px;color:var(--text-muted)}
.confirm-bar span{flex:1}
.source-link{color:var(--accent);text-decoration:none;word-break:break-all;font-size:13px}
.source-link:hover{text-decoration:underline}
.stats-bar{display:flex;flex-wrap:wrap;gap:10px;padding:16px 20px;justify-content:center}
@media(max-width:500px){.stats-bar{gap:6px}.stat-pill{padding:6px 10px;font-size:11px}}
footer{margin-top:auto;text-align:center;padding:24px;font-size:12px;color:var(--text-dim)}
.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
@media(max-width:768px){
  .toolbar{padding:10px 12px;gap:8px}
  .toolbar input{min-width:100%;flex:1 1 100%}
  .toolbar-actions{width:100%}
}
.hidden-input{position:absolute;width:0;height:0;opacity:0;pointer-events:none}
</style>
</head>

// ── MASTER RESOURCES LOADER ───────────────────────────────────────────────
async function loadFromMasterResources() {
  try {
    const response = await fetch('master-resources.json');
    if (!response.ok) throw new Error('Failed to fetch master-resources.json');
    const masterData = await response.json();

    // Map master categories to this app's categories
    const categoryMap = {
      "Height & Clearance Navigation": "RV / Motorhome Navigation",
      "RV & Motorhome Navigation": "RV / Motorhome Navigation",
      "Overlanding & Trail Navigation": "Topo & Mapping Tools",
      "Adventure Motorcycle": "Adventure Motorcycle",
      "Geo-Located PDF Maps": "Topo & Mapping Tools",
      "Federal Mapping & Public Lands": "BLM / USFS Official",
      "Camping & Boondocking": "Camping & Boondocking",
      "State DOT Road Conditions": "BLM / USFS Official",
      "State OHV & Trail Maps": "Adventure Motorcycle",
      "Print Maps & Atlases": "Topo & Mapping Tools",
      "Trip Planning & Scouting": "Topo & Mapping Tools",
      "Safety & Communication": "Safety & Communication",
      "Weather & Conditions": "Weather & Conditions"
    };

    // Convert master schema to this app's format
    const convertedResources = masterData.resources.map(r => ({
      id: r.id,
      name: r.name,
      category: categoryMap[r.category] || "Topo & Mapping Tools",
      subcategory: r.subcategory || '',
      url: r.url,
      platforms: r.platforms || ['Web'],
      pricing: r.cost || '',
      cost_tier: r.cost_tier || 'Free',
      offline: r.offline || r.offlineCapable || false,
      western_us_focus: r.states ? r.states.includes('US') || r.states.length > 1 : true,
      description: r.description || '',
      key_features: r.features || [],
      limitations: r.notes || '',
      best_for: r.bestFor || '',
      tags: r.tags || [],
      source_verified: r.source_verified || r.url
    }));

    // Save to AppSDK storage
    try {
      if (window.AppSDK && AppSDK.setState) {
        AppSDK.setState({ resources: convertedResources });
      }
    } catch (e) {}

    return convertedResources;
  } catch (error) {
    console.error('Failed to load master resources:', error);
    return null;
  }
}

// Extract unique categories from resources

// ── CHANGE TRACKING ─────────────────────────────────────────────────────
function loadChanges() {
  try {
    const stored = localStorage.getItem(CHANGES_KEY);
    return stored ? JSON.parse(stored) : { added: [], edited: [], deleted: [] };
  } catch {
    return { added: [], edited: [], deleted: [] };
  }
}

function saveChanges() {
  localStorage.setItem(CHANGES_KEY, JSON.stringify(changes));
  updateChangesBadge();
}

function trackAdd(resource) {
  if (!changes.added.some(a => a.id === resource.id)) {
    changes.added.push(resource);
    saveChanges();
    showToast('Resource added to changes');
  }
}

function trackEdit(originalResource, updatedResource) {
  // Check if in added - update it
  const addedIndex = changes.added.findIndex(a => a.id === originalResource.id);
  if (addedIndex !== -1) {
    changes.added[addedIndex] = updatedResource;
    saveChanges();
    return;
  }

  // Check if already in edited
  const editedIndex = changes.edited.findIndex(e => e.originalId === originalResource.id);
  if (editedIndex !== -1) {
    changes.edited[editedIndex] = { ...updatedResource, originalId: originalResource.id };
    saveChanges();
    return;
  }

  // Add to edited
  changes.edited.push({ ...updatedResource, originalId: originalResource.id });
  saveChanges();
  showToast('Edit tracked');
}

function trackDelete(resource) {
  // Check if in added - remove from added
  const addedIndex = changes.added.findIndex(a => a.id === resource.id);
  if (addedIndex !== -1) {
    changes.added.splice(addedIndex, 1);
    saveChanges();
    return;
  }

  // Check if in edited - remove from edited and add to deleted
  const editedIndex = changes.edited.findIndex(e => e.originalId === resource.id);
  if (editedIndex !== -1) {
    changes.edited.splice(editedIndex, 1);
  }

  // Add to deleted if not already there
  if (!changes.deleted.includes(resource.id)) {
    changes.deleted.push(resource.id);
    saveChanges();
    showToast('Deletion tracked');
  }
}

function getChangeStatus(resourceId) {
  if (changes.added.some(a => a.id === resourceId)) return 'added';
  if (changes.edited.some(e => e.originalId === resourceId)) return 'edited';
  return null;
}

function exportChanges() {
  if (changes.added.length === 0 && changes.edited.length === 0 && changes.deleted.length === 0) {
    showToast('No changes to export');
    return;
  }

  const exportData = {
    version: '1.0.0',
    exportDate: new Date().toISOString(),
    appName: 'Copilot Nav Resource Manager',
    changes: {
      added: changes.added,
      edited: changes.edited,
      deleted: changes.deleted
    }
  };

  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `copilot-nav-changes-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Changes exported!');
}

function importChanges(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);

      // Validate structure
      if (!data.changes || typeof data.changes !== 'object') {
        throw new Error('Invalid format');
      }

      // Merge changes
      if (data.changes.added) {
        data.changes.added.forEach(resource => {
          if (!changes.added.some(a => a.id === resource.id)) {
            changes.added.push(resource);
          }
        });
      }

      if (data.changes.edited) {
        data.changes.edited.forEach(edit => {
          if (!changes.edited.some(e => e.originalId === edit.originalId)) {
            changes.edited.push(edit);
          }
        });
      }

      if (data.changes.deleted) {
        data.changes.deleted.forEach(id => {
          if (!changes.deleted.includes(id)) {
            changes.deleted.push(id);
          }
        });
      }

      saveChanges();
      showToast('Changes imported successfully!');
    } catch (error) {
      showToast('Failed to import changes');
      console.error('Import error:', error);
    }
  };
  reader.readAsText(file);
}

function clearChanges() {
  if (!confirm('Are you sure you want to clear all tracked changes? This cannot be undone.')) {
    return;
  }
  changes = { added: [], edited: [], deleted: [] };
  saveChanges();
  renderCards();
  showToast('All changes cleared');
}

function updateChangesBadge() {
  const total = changes.added.length + changes.edited.length + changes.deleted.length;
  const badge = document.getElementById('changesBadge');
  if (badge) {
    badge.textContent = total > 0 ? total : '';
    badge.style.display = total > 0 ? 'inline-flex' : 'none';
  }
}

// Async initialization: master file → AppSDK → INITIAL_DATA
(async function initializeResources() {
  let loadedResources = null;

  // Try master file first
  loadedResources = await loadFromMasterResources();

  // Fall back to AppSDK storage
  if (!loadedResources) {
    const stored = loadState();
    if (stored) loadedResources = stored;
  }

  // Fall back to INITIAL_DATA
  if (!loadedResources) {
    loadedResources = JSON.parse(JSON.stringify(INITIAL_DATA.resources));
    console.log('Using INITIAL_DATA fallback');
  } else {
    console.log('Loaded ' + loadedResources.length + ' resources from master-resources.json');
  }

  resources = loadedResources;
  CATEGORIES = getCategoriesFromResources(resources);
  console.log('Categories: ' + CATEGORIES.join(', '));

  // Re-populate filters and re-render after loading
  populateFilters();
  renderCards();
})();

// ── FILTERS & SORT ──────────────────────────────────────────────────────
function getFiltered(){
  const q = document.getElementById('search-input-f4r2').value.toLowerCase().trim();
  const cat = document.getElementById('filter-cat-h8n3').value;
  const cost = document.getElementById('filter-cost-k1m7').value;
  const offOnly = document.getElementById('filter-offline-w2x6').checked;
  const sort = document.getElementById('sort-select-t3b5').value;

  let list = resources.filter(r=>{
    if(cat && r.category !== cat) return false;
    if(cost && r.cost_tier !== cost) return false;
    if(offOnly && !r.offline) return false;
    if(q){
      const hay = [r.name, r.description, r.subcategory||'', r.best_for||'', ...(r.tags||[])].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  if(sort==='name-asc') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='name-desc') list.sort((a,b)=>b.name.localeCompare(a.name));
  else if(sort==='category') list.sort((a,b)=>a.category.localeCompare(b.category));
  else if(sort==='cost') list.sort((a,b)=>a.cost_tier.localeCompare(b.cost_tier));
  else if(sort==='offline') list.sort((a,b)=>(b.offline?1:0)-(a.offline?1:0));

  return list;
}

// ── CARD EVENTS ─────────────────────────────────────────────────────────
function bindCardEvents(){
  // Expand/collapse
  document.querySelectorAll('[data-card-toggle]').forEach(el=>{
    el.addEventListener('click', e=>{
      if(e.target.closest('.tag-chip')||e.target.closest('a')||e.target.closest('button')) return;
      const id = el.dataset.cardToggle;
      expandedCard = expandedCard===id ? null : id;
      renderCards();
    });
  });
  // Tag clicks
  document.querySelectorAll('.tag-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.getElementById('search-input-f4r2').value = btn.dataset.tag;
      renderCards();
    });
  });
  // Edit
  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.addEventListener('click', ()=> openEditModal(btn.dataset.edit));
  });
  // Delete
  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      deleteConfirmId = btn.dataset.delete;
      renderCards();
    });
  });
  // Confirm delete
  document.querySelectorAll('[data-confirm-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.dataset.confirmDel;
      const resource = resources.find(r=>r.id===id);
      if (resource) trackDelete(resource);
      resources = resources.filter(r=>r.id!==id);
      deleteConfirmId = null;
      expandedCard = null;
      saveState();
      renderCards();
      showToast('Resource deleted','info');
    });
  });
  // Cancel delete
  document.querySelectorAll('[data-cancel-del]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      deleteConfirmId = null;
      renderCards();
    });
  });
}

  document.getElementById('form-cost-m3n4').value = r.cost_tier||'Free';
  document.getElementById('form-offline-o5p6').checked = !!r.offline;
  document.getElementById('form-western-q7r8').checked = !!r.western_us_focus;
  document.getElementById('form-desc-s9t0').value = r.description||'';
  document.getElementById('form-features-u1v2').value = (r.key_features||[]).join('\n');
  document.getElementById('form-limits-w3x4').value = r.limitations||'';
  document.getElementById('form-bestfor-y5z6').value = r.best_for||'';
  document.getElementById('form-tags-a7b8').value = (r.tags||[]).join(', ');
  openModal();
}

function handleFormSubmit(e){
  e.preventDefault();
  const editId = document.getElementById('form-edit-id-x0y1').value;
  const name = document.getElementById('form-name-a1b2').value.trim();
  const cat = document.getElementById('form-cat-c3d4').value;
  if(!name||!cat){ showToast('Name and Category are required','error'); return; }

  const platformsRaw = document.getElementById('form-platforms-i9j0').value;
  const tagsRaw = document.getElementById('form-tags-a7b8').value;
  const featuresRaw = document.getElementById('form-features-u1v2').value;

  const obj = {
    id: editId || slugify(name) + '-' + Date.now().toString(36).slice(-4),
    name,
    category: cat,
    subcategory: document.getElementById('form-subcat-e5f6').value.trim(),
    url: document.getElementById('form-url-g7h8').value.trim(),
    platforms: platformsRaw ? platformsRaw.split(',').map(s=>s.trim()).filter(Boolean) : [],
    pricing: document.getElementById('form-pricing-k1l2').value.trim(),
    cost_tier: document.getElementById('form-cost-m3n4').value,
    offline: document.getElementById('form-offline-o5p6').checked,
    western_us_focus: document.getElementById('form-western-q7r8').checked,
    description: document.getElementById('form-desc-s9t0').value.trim(),
    key_features: featuresRaw ? featuresRaw.split('\n').map(s=>s.trim()).filter(Boolean) : [],
    limitations: document.getElementById('form-limits-w3x4').value.trim(),
    best_for: document.getElementById('form-bestfor-y5z6').value.trim(),
    tags: tagsRaw ? tagsRaw.split(',').map(s=>s.trim()).filter(Boolean) : [],
    source_verified: document.getElementById('form-url-g7h8').value.trim()
  };

  if(editId){
    const idx = resources.findIndex(r=>r.id===editId);
    if(idx>-1) {
      const originalResource = resources[idx];
      resources[idx] = {...resources[idx], ...obj};
      trackEdit(originalResource, resources[idx]);
    }
    showToast('Resource updated','success');
  } else {
    resources.push(obj);
    trackAdd(obj);
    showToast('Resource added','success');
  }

  saveState();
  closeModal();
  renderCards();
}

// ── EXPORT ──────────────────────────────────────────────────────────────
function exportJSON(){
  const data = {
    metadata: {...INITIAL_DATA.metadata, totalResources: resources.length, exported: new Date().toISOString()},
    categories: CATEGORIES,
    resources
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  a.href = url; a.download = `nav-resources-${ts}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  showToast('Database exported as JSON','info');
}

// ── IMPORT ──────────────────────────────────────────────────────────────
function handleImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = JSON.parse(ev.target.result);
      const incoming = data.resources || data;
      if(!Array.isArray(incoming)) throw new Error('Invalid format');
      const existingIds = new Set(resources.map(r=>r.id));
      let added = 0;
      incoming.forEach(r=>{
        if(r.id && !existingIds.has(r.id)){
          resources.push(r);
          existingIds.add(r.id);
          added++;
        }
      });
      saveState();
      renderCards();
      showToast(`Imported ${added} new resource${added!==1?'s':''}`,'success');
    }catch(err){
      showToast('Invalid JSON file: ' + err.message,'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── INIT ────────────────────────────────────────────────────────────────
// Populate category dropdowns
function populateFilters() {
  const filterCat = document.getElementById('filter-cat-h8n3');
  const formCat = document.getElementById('form-cat-c3d4');
  filterCat.innerHTML = '<option value="">All Categories</option>';
  formCat.innerHTML = '';
  CATEGORIES.forEach(c=>{
    filterCat.innerHTML += `<option value="${c}">${c}</option>`;
    formCat.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

async function initApp() {
  // Wait for resources to be loaded
  while (typeof resources === 'undefined' || resources === null) {
    await new Promise(resolve => setTimeout(resolve, 10));
  }

  // Populate category dropdowns
  populateFilters();

  // Bind toolbar events
  document.getElementById('search-input-f4r2').addEventListener('input', ()=>renderCards());
  document.getElementById('filter-cat-h8n3').addEventListener('change', ()=>renderCards());
  document.getElementById('filter-cost-k1m7').addEventListener('change', ()=>renderCards());
  document.getElementById('filter-offline-w2x6').addEventListener('change', ()=>renderCards());
  document.getElementById('sort-select-t3b5').addEventListener('change', ()=>renderCards());

  // Add button
  document.getElementById('btn-add-y6g8').addEventListener('click', ()=>{
    document.getElementById('modal-title-s1q3').textContent = 'Add Resource';
    document.getElementById('form-edit-id-x0y1').value = '';
    openModal();
  });

  // Export
  document.getElementById('btn-export-e5d2').addEventListener('click', exportJSON);

  // Import
  document.getElementById('btn-import-u7h1').addEventListener('click', ()=>{
    document.getElementById('import-file-z3k9').click();
  });
  document.getElementById('import-file-z3k9').addEventListener('change', handleImport);

  // Changes
  document.getElementById('btn-export-changes').addEventListener('click', exportChanges);
  document.getElementById('import-changes-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importChanges(file);
    e.target.value = '';
  });
  document.getElementById('btn-clear-changes').addEventListener('click', clearChanges);
  updateChangesBadge();

  // Modal
  document.getElementById('btn-cancel-c9d0').addEventListener('click', closeModal);
  document.getElementById('modal-overlay-c6d8').addEventListener('click', e=>{
    if(e.target.id==='modal-overlay-c6d8') closeModal();
  });
  document.getElementById('resource-form-v8w2').addEventListener('submit', handleFormSubmit);

  // Initial render
  renderCards();
  lucide.createIcons();
}

// Call init when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}
</script>
